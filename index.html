<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject - Android Game</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 20px;
        }
        h1 {
            font-size: 48px;
            margin: 0 0 20px 0;
        }
        p {
            font-size: 18px;
            margin: 10px 0;
        }
        .links {
            margin-top: 40px;
        }
        a {
            display: inline-block;
            background-color: white;
            color: #667eea;
            padding: 12px 30px;
            margin: 10px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Subject</h1>
        <p>Android Game</p>
        <p style="font-size: 16px; opacity: 0.9;">Powered by Solana & Google</p>
        
        <div class="links">
            <a href="privacy-policy.html">Privacy Policy</a>
        </div>
        
        <p style="margin-top: 60px; font-size: 14px; opacity: 0.8;">
            © 2026 utsoft. All rights reserved.
        </p>
    </div>
</body>
</html>
